<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last Night on Earth Game</title>

  <!-- Add-to-home-screen (named "LNOE" with a zombie icon) -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0c0d10" />
  <link rel="icon" type="image/png" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LNOE" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===================== LOGIN SCREEN ===================== -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <h1 class="game-title">Last Night<span>on</span>Earth</h1>
      <p class="tagline">The Zombie plays itself. You fight to survive.</p>

      <div id="auth-error" class="auth-error" hidden></div>
      <div id="auth-info" class="auth-info" hidden></div>

      <div id="form-login">
        <label>Email<input type="email" id="login-email" autocomplete="username" /></label>
        <label>Password<input type="password" id="login-password" autocomplete="current-password" /></label>
        <button class="btn btn-primary" id="btn-login">Log In</button>
        <div class="auth-links">
          <a href="#" id="link-forgot">Forgot password?</a>
          <a href="#" id="link-to-signup">Create an account</a>
        </div>
      </div>

      <div id="form-signup" hidden>
        <label>Email<input type="email" id="signup-email" autocomplete="username" /></label>
        <label>Password (6+ characters)<input type="password" id="signup-password" autocomplete="new-password" /></label>
        <button class="btn btn-primary" id="btn-signup">Create Account</button>
        <div class="auth-links">
          <a href="#" id="link-to-login">Back to log in</a>
        </div>
      </div>

      <div id="form-forgot" hidden>
        <label>Email<input type="email" id="forgot-email" autocomplete="username" /></label>
        <button class="btn btn-primary" id="btn-forgot">Send Reset Link</button>
        <div class="auth-links">
          <a href="#" id="link-back-login">Back to log in</a>
        </div>
      </div>

      <p id="mode-note" class="mode-note"></p>
    </div>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app" hidden>
    <header class="topbar">
      <div class="brand">Last Night on Earth</div>
      <nav class="tabs">
        <button class="tab active" data-tab="start">Start Game</button>
        <button class="tab" data-tab="admin">Admin</button>
      </nav>
      <div class="user-box">
        <span id="user-email"></span>
        <button class="btn btn-ghost" id="btn-logout">Log out</button>
      </div>
    </header>

    <main>
      <section id="tab-start" class="tab-panel"></section>
      <section id="tab-admin" class="tab-panel" hidden></section>
    </main>
  </div>

  <!-- Firebase (compat build — works on static hosting, no build step) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- Config + data -->
  <script src="js/firebase-config.js"></script>
  <script src="js/sounds-config.js"></script>
  <script src="js/data/gamedata.js"></script>
  <script src="js/data/zombiedecks.js"></script>
  <script src="js/data/herodecks.js"></script>
  <script src="js/data/narration.js"></script>

  <!-- Engine + UI -->
  <script src="js/store.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/horrorfx.js"></script>
  <script src="js/zombieai.js"></script>
  <script src="js/setup.js"></script>
  <script src="js/game.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <!-- Local preview auto-login: loads js/dev-login.js ONLY on localhost.
       That file is git-ignored, so it never exists on the live site and this
       request is never even made there. -->
  <script>
    (function () {
      var h = location.hostname;
      if (h === "localhost" || h === "127.0.0.1" || h === "") {
        var s = document.createElement("script");
        s.src = "js/dev-login.js";
        s.onerror = function () { /* no dev-login file present — that's fine */ };
        document.head.appendChild(s);
      }
    })();
  </script>
</body>
</html>
